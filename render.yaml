services:
  - type: web
    name: pipeline-ai
    env: node
    region: oregon
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /opt/render/project/src/data
    disk:
      name: pipeline-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
